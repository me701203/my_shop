<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Staff Panel{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
        .navbar { background: #1a1a2e; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
        .navbar a { color: #ccc; text-decoration: none; font-size: 14px; }
        .navbar a:hover { color: white; }
        .navbar .brand { font-weight: bold; font-size: 16px; color: white; }
        .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 20px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-pending    { background: #fef3c7; color: #92400e; }
        .badge-confirmed  { background: #dbeafe; color: #1e40af; }
        .badge-packaging  { background: #ede9fe; color: #5b21b6; }
        .badge-shipped    { background: #d1fae5; color: #065f46; }
        .badge-delivered  { background: #bbf7d0; color: #14532d; }
        .badge-cancelled  { background: #fee2e2; color: #991b1b; }
        .badge-success    { background: #d1fae5; color: #065f46; }
        .badge-failed     { background: #fee2e2; color: #991b1b; }
        .badge-refunded   { background: #e0e7ff; color: #3730a3; }
        .badge-partially_refunded { background: #fce7f3; color: #9d174d; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9fafb; font-weight: 600; color: #555; }
        tr:hover td { background: #fafafa; }
        a { color: #2563eb; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        input, select { padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #1a1a2e; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
        .pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; font-size: 14px; }
        .quick-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .quick-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #ddd; background: white; cursor: pointer; text-decoration: none; color: #555; }
        .quick-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    </style>
</head>
<body>
<nav class="navbar">
    <span class="brand">⚙ Staff Panel</span>
    <a href="{% url 'staff:dashboard' %}">Dashboard</a>
    <a href="{% url 'staff:order_list' %}">Orders</a>
    <a href="{% url 'staff:sales_dashboard' %}">Sales</a>
    <a href="{% url 'staff:staff_stock_list' %}">Stock</a>

    <span style="margin-left:auto; font-size:13px; color:#aaa;">{{ request.user.email }}</span>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}

</body>
</html>
