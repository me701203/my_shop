{% extends "shop/base.html" %}
{% load currency_filters %}
{% load digits %}
{% load i18n %}

{% block title %}
  {% trans "Test Payment Gateway" %}
{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; text-align: center; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
  <h1 style="color: #2c3e50;">{% trans "Test Payment Gateway" %}</h1>
  <hr>
  <p style="font-size: 1.2rem;">
    {% trans "Amount" %}: <strong>{{ amount|currency }}</strong>
  </p>

  <form method="post" style="margin-top: 20px;">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">{% trans "Select payment result" %}</label>
        <select name="result" style="padding: 10px; width: 100%; border-radius: 4px; border: 1px solid #ccc;">
          <option value="success">{% trans "Successful payment" %}</option>
          <option value="cancel">{% trans "Cancel payment" %}</option>
        </select>
    </div>
    
    <button type="submit" style="background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem;">
      {% trans "Continue" %}
    </button>
  </form>
</div>
{% endblock %}
