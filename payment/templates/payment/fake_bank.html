{% extends "shop/base.html" %}
{% load currency_filters %}

{% block title %}{{ ORDER_LABELS.fake_bank_title }}{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; text-align: center; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
  <h1 style="color: #2c3e50;">{{ ORDER_LABELS.fake_bank_title }}</h1>
  <hr>
  <p style="font-size: 1.2rem;">
    {{ ORDER_LABELS.fake_bank_amount_label }}: <strong>{{ amount|currency }}</strong>
  </p>

  <form method="post" style="margin-top: 20px;">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">{{ ORDER_LABELS.fake_bank_choose_result }}</label>
        <select name="result" style="padding: 10px; width: 100%; border-radius: 4px; border: 1px solid #ccc;">
          <option value="success">{{ ORDER_LABELS.fake_bank_successful_payment }}</option>
          <option value="cancel">{{ ORDER_LABELS.fake_bank_cancel_payment }}</option>
        </select>
    </div>
    
    <button type="submit" style="background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem;">
        {{ ORDER_LABELS.checkout }}
    </button>
  </form>
</div>
{% endblock %}
